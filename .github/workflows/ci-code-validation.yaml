name: CI code validation

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "esbuild.config.mjs"
      - "tsconfig.build.json"
      - "package.json"
  pull_request:
    paths:
      - "src/**"
      - "esbuild.config.mjs"
      - "tsconfig.build.json"
      - "package.json"

jobs:
  check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24, 26]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Test with coverage
        run: npx vitest run --coverage

  build:
    needs: check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
